name: Terraform Deployment

on:
  push:
    branches:
      - 'feature/*'
      - main

  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  predeployment:
    name: Terraform PreDeployment

    runs-on:
      - self-hosted
      - Jitu-runner

    environment: DEV

    defaults:
      run:
        working-directory: Environments/Dev

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Subscription
        run: az account show

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

  deployment:
    name: Terraform Deployment

    needs: predeployment

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on:
      - self-hosted
      - Jitu-runner

    environment: DEV

    defaults:
      run:
        working-directory: Environments/Dev

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Subscription
        run: az account show

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

        