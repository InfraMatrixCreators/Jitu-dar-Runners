name: terraform-deployment

on:
  push:
    branches:
      - 'feature/*'
      - main

  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  terraform-plan:
    name: Terraform Plan

    runs-on:
      - self-hosted
      - Jitu-runner

    defaults:
      run:
        working-directory: Environments/UAT

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.CLIENT }}
          tenant-id: ${{ secrets.TENANT }}
          subscription-id: ${{ secrets.SUBSCRIPTION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan 


  terraform-apply:
    name: Terraform Apply

    needs: terraform-plan

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on:
      - self-hosted
      - Jitu-runner

    defaults:
      run:
        working-directory: Environments/UAT

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.CLIENT }}
          tenant-id: ${{ secrets.TENANT }}
          subscription-id: ${{ secrets.SUBSCRIPTION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve 

