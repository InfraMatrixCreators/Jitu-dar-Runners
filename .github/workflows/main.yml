name: terraform-deploy
on: push
permissions: 
 id-token: write
 contents: read
jobs:
  terraform-job:
   runs-on: 
    - self-hosted
    - Jitu-runner
   steps:
     - name: Checkout
       uses: actions/checkout@v6.0.3
     - name: Azure Login
       uses: Azure/login@v3
       with:
        client-id: ${{secrets.CLIENT}}
        tenant-id: ${{secrets.TENANT}}
        subscription-id: ${{secrets.SUBSCRIPTION}}
        
     
     
